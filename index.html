<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>碰碰精伶球</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            color: white;
            user-select: none;
        }
        canvas { display: block; }

        /* --- UI 層 --- */
        #hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .score-box {
            font-size: 4vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #p1-score-box { color: #00f3ff; text-shadow: 0 0 20px #00f3ff; }
        #p2-score-box { color: #ff0055; text-shadow: 0 0 20px #ff0055; }
        .player-label { font-size: 1.5vw; opacity: 0.8; }

        #timer-box {
            font-size: 5vw;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 5px 30px;
            border-radius: 0 0 20px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: none;
            text-shadow: 0 0 10px white;
            min-width: 120px;
            text-align: center;
        }
        .timer-warning { color: #ff3333 !important; animation: pulse 0.5s infinite; }

        #question-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            transition: top 0.3s;
        }
        #question-text {
            display: inline-block;
            font-size: 4vw;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 15px 60px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .bumper-mode-q { top: 20% !important; transform: translate(-50%, 0) !important; }

        #survival-countdown {
            position: absolute;
            top: 35%; 
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10vw; 
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 30px #ffcc00;
            display: none;
            z-index: 20;
        }

        /* --- 遊戲覆蓋層 --- */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .screen-content { text-align: center; width: 100%; }

        /* 結算佈局調整 */
        .result-container {
            display: flex; width: 92%; height: 92%; 
            gap: 20px; margin: auto;
        }
        .result-col {
            flex: 1; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .result-p1 { border-color: #00f3ff; box-shadow: 0 0 20px rgba(0,243,255,0.2); }
        .result-p2 { border-color: #ff0055; box-shadow: 0 0 20px rgba(255,0,85,0.2); }
        .result-center { flex: 1.4; background: rgba(0,0,0,0.3); } 

        h2 { margin: 0 0 10px 0; font-size: 2.2vw; text-transform: uppercase; }
        .big-score { font-size: 8vw; font-weight: 900; margin: auto; }
        
        /* 排行榜列表優化 */
        .leaderboard-list {
            width: 100%; text-align: left; 
            font-size: 1.0vw; 
            color: #ccc;
            overflow-y: hidden; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .lb-item {
            display: flex; justify-content: space-between; 
            padding: 4px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            align-items: center;
        }
        .lb-rank { width: 25px; font-weight: bold; color: #ffcc00; }
        .lb-name { flex: 1; text-align: center;}
        .lb-score { width: 50px; text-align: right; color: white; }

        #winner-input-section, #replay-btn-section {
            margin-top: 10px !important;
            margin-bottom: 5px;
        }

        input {
            background: transparent; border: 2px solid white; color: white;
            font-size: 1.8vw; padding: 5px; text-align: center; width: 180px;
            text-transform: uppercase; border-radius: 10px;
        }
        
        button {
            margin-top: 10px; padding: 8px 30px; font-size: 1.6vw;
            background: white; border: none; font-weight: bold; cursor: pointer;
            border-radius: 50px; box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: all 0.2s; pointer-events: auto;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,255,255,0.8); }

        #gp-status-indicator {
            position: absolute;
            bottom: 10px; left: 20px;
            font-size: 1vw; color: rgba(255,255,255,0.5); font-family: monospace;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <div class="top-bar">
            <div class="score-box" id="p1-score-box">
                <span class="player-label">P1 藍隊</span>
                <span id="p1-score">0</span>
            </div>
            <div id="timer-box">60</div>
            <div class="score-box" id="p2-score-box">
                <span class="player-label">P2 紅隊</span>
                <span id="p2-score">0</span>
            </div>
        </div>
        
        <div id="question-container" class="bumper-mode-q">
            <div id="question-text">準備開始...</div>
        </div>
        
        <div id="survival-countdown">5</div>
    </div>

    <div id="gp-status-indicator"></div>

    <div id="overlay">
        <!-- 開始畫面 -->
        <div id="start-screen" class="screen-content">
            <h1 style="font-size:5vw; color:white; text-shadow:0 0 30px #00f3ff; margin-bottom:10px;">
                碰碰精伶球
            </h1>
            <p style="font-size:1.5vw; color:#aaa; margin-bottom: 40px;">
                P1: <b>WASD</b> &nbsp;|&nbsp; P2: <b>方向鍵</b>
            </p>
            <p style="color:#ffcc00; font-size: 1.3vw; background: rgba(0,0,0,0.5); display:inline-block; padding:10px 20px; border-radius:20px;">
                ⭐ 撞球模式：有向數、方程、指數 (撞對得分)<br>
                ⭐ 生存模式：畢氏定理、不等式、幾何 (搶地盤)
            </p>
            <br>
            <button id="start-btn">開始對戰 (按 Space)</button>
        </div>

        <!-- 結束畫面 -->
        <div id="end-screen" class="result-container" style="display:none;">
            <div class="result-col result-p1">
                <h2>P1 藍隊</h2>
                <div class="big-score" id="end-p1-score">0</div>
                <div id="p1-win-msg" style="display:none; color:#00f3ff; font-weight:bold; font-size:3vw; margin-top:20px;">WINNER</div>
            </div>

            <div class="result-col result-center">
                <h2>TOP 10 排行榜</h2>
                <div class="leaderboard-list" id="lb-list"></div>
                
                <div id="winner-input-section" style="margin-top:20px; display:none;">
                    <p style="margin:5px;">恭喜獲勝！輸入名字：</p>
                    <input type="text" id="winner-name" maxlength="5" placeholder="NAME">
                    <br>
                    <button id="submit-score-btn" style="font-size: 1.5vw; padding: 10px 30px;">儲存 (按 Enter)</button>
                </div>
                <div id="replay-btn-section" style="display:none; text-align:center;">
                    <button id="replay-btn" style="font-size: 1.5vw; padding: 10px 30px;">回開始頁 (按 Space)</button>
                </div>
            </div>

            <div class="result-col result-p2">
                <h2>P2 紅隊</h2>
                <div class="big-score" id="end-p2-score">0</div>
                <div id="p2-win-msg" style="display:none; color:#ff0055; font-weight:bold; font-size:3vw; margin-top:20px;">WINNER</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gpStatusDiv = document.getElementById('gp-status-indicator');
        
        const ui = {
            timer: document.getElementById('timer-box'),
            qContainer: document.getElementById('question-container'),
            qText: document.getElementById('question-text'),
            p1Score: document.getElementById('p1-score'),
            p2Score: document.getElementById('p2-score'),
            survivalCnt: document.getElementById('survival-countdown'),
            overlay: document.getElementById('overlay'),
            startScreen: document.getElementById('start-screen'),
            endScreen: document.getElementById('end-screen'),
            endP1: document.getElementById('end-p1-score'),
            endP2: document.getElementById('end-p2-score'),
            inputSec: document.getElementById('winner-input-section'),
            replaySec: document.getElementById('replay-btn-section'),
            winnerInput: document.getElementById('winner-name'),
            lbList: document.getElementById('lb-list'),
            p1WinMsg: document.getElementById('p1-win-msg'),
            p2WinMsg: document.getElementById('p2-win-msg')
        };

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('submit-score-btn').onclick = submitScore;
        document.getElementById('replay-btn').onclick = () => location.reload();

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 遊戲參數 ---
        let gameState = 'start'; 
        let gameTime = 60; 
        let timerInterval = null;
        let specialEventTriggered = false; // 已移除特別題邏輯，保留變數防止報錯
        let continuousScoreTimer = 0;

        let currentMode = 'bumper'; 
        let survivalTargetTime = 0; 
        const SURVIVAL_PREP_TIME = 5; 

        let questionCounter = 0; 
        let lastBumperType = ''; 
        let questionHistory = new Set();

        const players = {
            p1: { x: 0, y: 0, r: 25, color: '#00f3ff', score: 0, vx: 0, vy: 0, keys: {u:'w', d:'s', l:'a', r:'d'} },
            p2: { x: 0, y: 0, r: 25, color: '#ff0055', score: 0, vx: 0, vy: 0, keys: {u:'ArrowUp', d:'ArrowDown', l:'ArrowLeft', r:'ArrowRight'} }
        };
        const keysPressed = {};
        
        window.addEventListener('keydown', (e) => {
            keysPressed[e.key] = true;
            if (e.code === 'Space' || e.key === ' ') {
                if (gameState === 'start') { e.preventDefault(); startGame(); } 
                else if (gameState === 'end' && ui.replaySec.style.display !== 'none') { e.preventDefault(); location.reload(); }
            }
            if (e.code === 'Enter') {
                if (gameState === 'end' && ui.inputSec.style.display !== 'none') { submitScore(); }
            }
        });
        window.addEventListener('keyup', (e) => keysPressed[e.key] = false);

        window.addEventListener("gamepadconnected", updateGamepadStatus);
        window.addEventListener("gamepaddisconnected", updateGamepadStatus);

        function updateGamepadStatus() {
            const gps = navigator.getGamepads ? navigator.getGamepads() : [];
            let active = 0;
            if(gps[0]) active++;
            if(gps[1]) active++;
            if(active > 0) gpStatusDiv.innerHTML = `🎮 已連接 ${active} 支控制器`;
            else gpStatusDiv.innerHTML = "";
        }

        let gamepadBtnPressed = { p1: false, p2: false };
        let targets = [];
        let particles = [];
        let floatingTexts = [];
        let shakeFrames = 0;

        function startGame() {
            if (gameState === 'playing') return;

            players.p1.score = 0; players.p2.score = 0;
            players.p1.x = canvas.width * 0.2; players.p1.y = canvas.height * 0.5;
            players.p2.x = canvas.width * 0.8; players.p2.y = canvas.height * 0.5;
            players.p1.vx = 0; players.p1.vy = 0;
            players.p2.vx = 0; players.p2.vy = 0;
            
            gameTime = 60; 
            specialEventTriggered = false;
            questionCounter = 0;
            lastBumperType = '';
            questionHistory.clear();
            
            ui.timer.classList.remove('timer-warning');
            ui.startScreen.style.display = 'none';
            ui.endScreen.style.display = 'none';
            ui.overlay.style.display = 'none';
            
            updateScoreUI();
            
            gameState = 'playing';
            generateQuestion(); 
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(gameTimerLogic, 1000);
            
            requestAnimationFrame(gameLoop);
        }

        function gameTimerLogic() {
            if (gameState !== 'playing') return;
            gameTime--;
            ui.timer.innerText = gameTime;
            
            if (gameTime <= 10) ui.timer.classList.add('timer-warning');
            if (gameTime <= 0) endGame();
        }

        function generateQuestion() {
            questionCounter++;
            let isSurvivalTurn = (questionCounter % 3 === 0);
            if (isSurvivalTurn) {
                setSurvivalMode(false);
                generateSurvivalQuestion();
            } else {
                setBumperMode();
                generateBumperQuestion();
            }
        }

        function setBumperMode() {
            currentMode = 'bumper';
            ui.qContainer.classList.add('bumper-mode-q');
        }

        function setSurvivalMode(isSpecial) {
            currentMode = 'survival';
            ui.qContainer.classList.remove('bumper-mode-q');
            targets = []; 
        }

        function generateBumperQuestion() {
            // 初中基礎運算 (Bumper)
            let types = ['directed', 'algebra', 'power']; 
            let type, qStr, ans, qID;
            let attempts = 0;
            do {
                attempts++;
                do { type = types[Math.floor(Math.random() * types.length)]; } while (type === lastBumperType);
                
                if (type === 'directed') {
                    // 有向數加減 (e.g. -3 + 5)
                    let a = Math.floor(Math.random()*9) + 1; // 1-9
                    let b = Math.floor(Math.random()*9) + 1;
                    if(Math.random() < 0.5) a = -a; // a 可能是負數
                    let sign = Math.random() < 0.5 ? '+' : '-';
                    qStr = `${a} ${sign} ${b} = ?`;
                    ans = (sign==='+') ? a+b : a-b;
                    qID = `dir_${a}_${sign}_${b}`;
                } else if (type === 'algebra') {
                    // 簡易方程 (e.g. 2x = 10, x + 3 = 8)
                    let sub = Math.random();
                    if (sub < 0.5) {
                        // ax = b
                        let x = Math.floor(Math.random()*9) + 2; // 答案
                        let coef = Math.floor(Math.random()*4) + 2; // 係數 2-5
                        let res = x * coef;
                        qStr = `解方程: ${coef}x = ${res}`;
                        ans = x;
                        qID = `alg_mul_${coef}_${res}`;
                    } else {
                        // x + a = b
                        let x = Math.floor(Math.random()*15) - 5; // 答案
                        let a = Math.floor(Math.random()*10) + 1;
                        let res = x + a;
                        let sign = a < 0 ? '-' : '+';
                        qStr = `解方程: x ${sign} ${Math.abs(a)} = ${res}`;
                        ans = x;
                        qID = `alg_add_${a}_${res}`;
                    }
                } else if (type === 'power') {
                    // 指數與平方根
                    let sub = Math.random();
                    if (sub < 0.4) {
                        // 簡單平方/立方: 2^3, 3^2, 5^2
                        let base = Math.floor(Math.random()*5) + 2; 
                        let exp = base > 3 ? 2 : Math.floor(Math.random()*2)+2; // 2 or 3
                        qStr = `${base} 的 ${exp} 次方 = ?`;
                        ans = Math.pow(base, exp);
                        qID = `pow_${base}_${exp}`;
                    } else {
                        // 平方根: sqrt(16), sqrt(36)
                        let root = Math.floor(Math.random()*9) + 2; // 2-10
                        let sq = root * root;
                        qStr = `√${sq} = ?`;
                        ans = root;
                        qID = `sqrt_${sq}`;
                    }
                }
            } while (questionHistory.has(qID) && attempts < 10);
            questionHistory.add(qID);
            lastBumperType = type;
            ui.qText.innerText = qStr;
            spawnBalls(ans);
        }

        function generateSurvivalQuestion() {
            // 初中基礎概念 (Survival)
            let types = ['pythagoras', 'inequality', 'angle'];
            let type = types[Math.floor(Math.random()*types.length)];
            let qStr = "", opts = [], qID;
            let attempts = 0;
            do {
                attempts++;
                if (type === 'pythagoras') {
                    // 畢氏定理 (勾股數)
                    // 3-4-5, 5-12-13, 6-8-10
                    let triples = [[3,4,5], [5,12,13], [6,8,10], [8,15,17]];
                    let t = triples[Math.floor(Math.random() * triples.length)];
                    qStr = `直角三角形邊長: ${t[0]}, ${t[1]}, ?`;
                    let ans = t[2];
                    
                    let w1 = ans + 1;
                    let w2 = ans - 1;
                    let w3 = ans + 2;
                    opts = [{val:ans, isCorrect:true, type:'text'}, {val:w1, isCorrect:false, type:'text'}, {val:w2, isCorrect:false, type:'text'}, {val:w3, isCorrect:false, type:'text'}];
                    qID = `pyth_${t[0]}`;

                } else if (type === 'inequality') {
                    // 不等式
                    let x = Math.floor(Math.random()*10);
                    let isGreater = Math.random() < 0.5;
                    qStr = isGreater ? `x > ${x} 的整數` : `x < ${x} 的整數`;
                    let correct = isGreater ? x + Math.floor(Math.random()*5)+1 : x - Math.floor(Math.random()*5)-1;
                    
                    let w1, w2, w3;
                    if(isGreater) {
                        w1 = x; w2 = x - 1; w3 = x - 5;
                    } else {
                        w1 = x; w2 = x + 1; w3 = x + 5;
                    }
                    opts = [{val:correct, isCorrect:true, type:'text'}, {val:w1, isCorrect:false, type:'text'}, {val:w2, isCorrect:false, type:'text'}, {val:w3, isCorrect:false, type:'text'}];
                    qID = `ineq_${x}_${isGreater}`;

                } else if (type === 'angle') {
                    // 幾何角度 (保持原有的)
                    let subType = Math.floor(Math.random()*3); 
                    qID = `sur_ang_${subType}`;
                    const acutes = [30, 45, 60, 75, 80];
                    const obtuses = [100, 120, 135, 150, 160];
                    const rights = [90];
                    let correct, w1, w2, w3;
                    if(subType === 0) { 
                        qStr = "找出「直角」"; correct = 90;
                        let pool = [...acutes, ...obtuses]; pool.sort(() => Math.random() - 0.5); 
                        [w1, w2, w3] = pool.slice(0, 3);
                    } else if(subType === 1) { 
                        qStr = "找出「銳角」"; correct = acutes[Math.floor(Math.random() * acutes.length)];
                        let pool = [...rights, ...obtuses]; pool.sort(() => Math.random() - 0.5); 
                        [w1, w2, w3] = pool.slice(0, 3);
                    } else { 
                        qStr = "找出「鈍角」"; correct = obtuses[Math.floor(Math.random() * obtuses.length)];
                        let pool = [...rights, ...acutes]; pool.sort(() => Math.random() - 0.5);
                        [w1, w2, w3] = pool.slice(0, 3);
                    }
                    opts = [{val:correct, isCorrect:true, type:'angle'}, {val:w1, isCorrect:false, type:'angle'}, {val:w2, isCorrect:false, type:'angle'}, {val:w3, isCorrect:false, type:'angle'}];
                }
            } while (questionHistory.has(qID) && attempts < 5);
            questionHistory.add(qID);
            ui.qText.innerText = qStr;
            spawnZones(opts);
            startSurvivalCountdown();
        }

        function startSurvivalCountdown() {
            // 使用真實時間運算
            survivalTargetTime = Date.now() + SURVIVAL_PREP_TIME * 1000;
            ui.survivalCnt.style.display = 'block';
            ui.survivalCnt.innerText = SURVIVAL_PREP_TIME;
        }

        function spawnBalls(ans) {
            targets = [];
            let vals = [ans];
            while(vals.length < 5) {
                let r = ans + Math.floor(Math.random()*10) - 5;
                if(r !== ans && !vals.includes(r)) vals.push(r);
            }
            vals.sort(()=>Math.random()-0.5);
            vals.forEach(v => {
                targets.push({ type: 'ball', x: Math.random()*(canvas.width-100)+50, y: Math.random()*(canvas.height-250)+200, r: 35, val: v, isCorrect: v===ans, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3 });
            });
        }

        function spawnZones(options) {
            targets = []; options.sort(()=>Math.random()-0.5);
            const w = canvas.width, h = canvas.height;
            const pos = [{x: w*0.25, y: h*0.35}, {x: w*0.75, y: h*0.35}, {x: w*0.25, y: h*0.75}, {x: w*0.75, y: h*0.75}];
            options.forEach((opt, i) => {
                if(i < 4) targets.push({ type: 'zone', x: pos[i].x, y: pos[i].y, r: 120, maxR: 120, val: opt.val, isCorrect: opt.isCorrect, drawType: opt.type });
            });
        }

        function updatePhysics() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            if(gameState === 'playing' || gameState === 'start') updateGamepadStatus();

            const deadzone = 0.2;

            let p1ax = 0, p1ay = 0;
            if (keysPressed['a']) p1ax = -1;
            if (keysPressed['d']) p1ax = 1;
            if (keysPressed['w']) p1ay = -1;
            if (keysPressed['s']) p1ay = 1;
            if (gamepads[0]) {
                if (Math.abs(gamepads[0].axes[0]) > deadzone) p1ax = gamepads[0].axes[0];
                if (Math.abs(gamepads[0].axes[1]) > deadzone) p1ay = gamepads[0].axes[1];
            }
            players.p1.vx += p1ax * 0.75; // 速度減慢
            players.p1.vy += p1ay * 0.75;

            let p2ax = 0, p2ay = 0;
            if (keysPressed['ArrowLeft']) p2ax = -1;
            if (keysPressed['ArrowRight']) p2ax = 1;
            if (keysPressed['ArrowUp']) p2ay = -1;
            if (keysPressed['ArrowDown']) p2ay = 1;
            if (gamepads[1]) {
                if (Math.abs(gamepads[1].axes[0]) > deadzone) p2ax = gamepads[1].axes[0];
                if (Math.abs(gamepads[1].axes[1]) > deadzone) p2ay = gamepads[1].axes[1];
            }
            players.p2.vx += p2ax * 0.75; 
            players.p2.vy += p2ay * 0.75;

            [players.p1, players.p2].forEach(p => {
                p.vx *= 0.92; p.vy *= 0.92;
                p.x += p.vx; p.y += p.vy;
                if(p.x<p.r) {p.x=p.r; p.vx*=-0.5;}
                if(p.x>canvas.width-p.r) {p.x=canvas.width-p.r; p.vx*=-0.5;}
                if(p.y<p.r+100) {p.y=p.r+100; p.vy*=-0.5;}
                if(p.y>canvas.height-p.r) {p.y=canvas.height-p.r; p.vy*=-0.5;}
            });

            let dx = players.p2.x - players.p1.x;
            let dy = players.p2.y - players.p1.y;
            let dist = Math.hypot(dx, dy);
            if(dist < players.p1.r + players.p2.r) {
                let angle = Math.atan2(dy, dx);
                let push = 15.0; 
                let px = Math.cos(angle)*push, py = Math.sin(angle)*push;
                players.p1.vx -= px; players.p1.vy -= py;
                players.p2.vx += px; players.p2.vy += py;
                let overlap = (players.p1.r + players.p2.r - dist) / 2 + 1;
                players.p1.x -= Math.cos(angle)*overlap; players.p1.y -= Math.sin(angle)*overlap;
                players.p2.x += Math.cos(angle)*overlap; players.p2.y += Math.sin(angle)*overlap;
                shakeScreen(10); 
            }

            if(currentMode === 'bumper') updateBumperLogic();
            else updateSurvivalLogic();
        }

        function updateBumperLogic() {
            [players.p1, players.p2].forEach(p => {
                for(let i=targets.length-1; i>=0; i--) {
                    let t = targets[i];
                    if(t.type !== 'ball') continue;
                    t.x+=t.vx; t.y+=t.vy;
                    if(t.x<t.r||t.x>canvas.width-t.r) t.vx*=-1;
                    if(t.y<t.r+100||t.y>canvas.height-t.r) t.vy*=-1;
                    let d = Math.hypot(p.x - t.x, p.y - t.y);
                    if(d < p.r + t.r) {
                        if(t.isCorrect) {
                            p.score = parseFloat((p.score + 10).toFixed(1)); 
                            spawnParticles(t.x, t.y, '#00ff00', 30);
                            spawnFloatText(t.x, t.y, "+10", p.color);
                            shakeScreen(10);
                            updateScoreUI();
                            generateQuestion(); 
                            return; 
                        } else {
                            p.score = parseFloat(Math.max(0, p.score - 1).toFixed(1));
                            spawnParticles(t.x, t.y, '#ff0000', 10);
                            spawnFloatText(t.x, t.y, "-1", '#ff0000');
                            shakeScreen(5);
                            updateScoreUI();
                            // 錯球反彈力度 0.1
                            t.vx = (t.x-p.x)*0.1; t.vy = (t.y-p.y)*0.1; 
                        }
                    }
                }
            });
        }

        function updateSurvivalLogic() {
            let now = Date.now();
            let remaining = Math.ceil((survivalTargetTime - now) / 1000);

            if (remaining > 0) {
                ui.survivalCnt.innerText = remaining;
            } else {
                ui.survivalCnt.style.display = 'none';
                checkSurvivalResult(); 
                generateQuestion(); 
            }
            
            targets.forEach(t => {
                if (t.type === 'zone') {
                    if (remaining > 0) t.r = t.maxR * (0.95 + Math.sin(now/200)*0.05);
                }
            });
        }

        function checkSurvivalResult() {
            let anyCorrect = false;
            [players.p1, players.p2].forEach(p => {
                let safe = false;
                targets.forEach(t => {
                    if (t.isCorrect && Math.hypot(p.x-t.x, p.y-t.y) < t.r) safe = true;
                });
                if (safe) {
                    p.score += 10;
                    spawnFloatText(p.x, p.y, "+10", p.color);
                    spawnParticles(p.x, p.y, '#ffff00', 30);
                    anyCorrect = true;
                } else {
                    p.score = Math.max(0, p.score - 1); 
                    spawnFloatText(p.x, p.y, "Miss", "#aaa");
                    // 生存模式錯位彈飛力度 15
                    p.vx = (Math.random()-0.5)*15; p.vy = (Math.random()-0.5)*15; 
                }
            });
            updateScoreUI();
            if (anyCorrect) shakeScreen(10);
        }

        function draw() {
            checkGamepadButtons();
            let tx=0, ty=0;
            if(shakeFrames>0) { tx=(Math.random()-0.5)*shakeFrames; ty=(Math.random()-0.5)*shakeFrames; shakeFrames--; }
            ctx.save(); ctx.translate(tx, ty);
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth=1;
            for(let i=0; i<canvas.width; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=100) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            targets.forEach(t => {
                if(t.type === 'ball') {
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2);
                    ctx.fillStyle = '#222'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth=2; ctx.stroke();
                    ctx.fillStyle='#fff'; ctx.font='bold 24px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(t.val, t.x, t.y);
                } else if (t.type === 'zone') {
                    if (t.r <= 0) return;
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(0,243,255,0.15)';
                    ctx.fill(); ctx.strokeStyle = '#00f3ff'; ctx.lineWidth = 4; ctx.stroke();
                    drawZoneContent(t);
                }
            });

            [players.p1, players.p2].forEach(p => {
                ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.fill();
                let angle = (Math.abs(p.vx)<0.1 && Math.abs(p.vy)<0.1) ? -Math.PI/2 : Math.atan2(p.vy, p.vx);
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath(); ctx.arc(p.x+Math.cos(angle)*15, p.y+Math.sin(angle)*15, 8, 0, Math.PI*2);
                ctx.fill(); ctx.shadowBlur = 0;
            });

            particles.forEach((p, i) => {
                p.x+=p.vx; p.y+=p.vy; p.life-=0.05;
                if(p.life>0) {ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,5,5);} else particles.splice(i,1);
            });
            ctx.globalAlpha=1;
            floatingTexts.forEach((ft, i) => {
                ft.y-=1; ft.life-=0.02;
                if(ft.life>0) {ctx.globalAlpha=ft.life; ctx.font="bold 30px Arial"; ctx.fillStyle=ft.color; ctx.fillText(ft.text, ft.x, ft.y);} else floatingTexts.splice(i,1);
            });
            ctx.globalAlpha=1;
            ctx.restore();
        }

        function checkGamepadButtons() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            [0, 1].forEach(idx => {
                const gp = gamepads[idx];
                if (gp) {
                    const btnPressed = gp.buttons[0].pressed || gp.buttons[9].pressed || gp.buttons[1].pressed;
                    const playerId = idx === 0 ? 'p1' : 'p2';
                    if (btnPressed && !gamepadBtnPressed[playerId]) {
                        if (gameState === 'start') startGame();
                        else if (gameState === 'end') {
                            if (ui.inputSec.style.display === 'block') submitScore();
                            else if (ui.replaySec.style.display === 'block') location.reload();
                        }
                        gamepadBtnPressed[playerId] = true;
                    } else if (!btnPressed) gamepadBtnPressed[playerId] = false;
                }
            });
        }

        function drawZoneContent(t) {
            ctx.fillStyle = '#fff'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
            let scale = Math.min(1, t.r / 60); 
            if (t.drawType === 'text') {
                ctx.font = `bold ${40 * scale}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(t.val, t.x, t.y);
            } else if (t.drawType === 'angle') {
                let s = scale; 
                let len = 40 * s;
                let cx = t.x, cy = t.y + 15 * s;
                ctx.beginPath(); ctx.moveTo(cx + len, cy); ctx.lineTo(cx, cy);       
                let rad = -t.val * Math.PI / 180;
                ctx.lineTo(cx + len * Math.cos(rad), cy + len * Math.sin(rad));
                ctx.stroke();
                ctx.beginPath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ff3333'; 
                if(t.val === 90) {
                    let size = 15 * s;
                    ctx.moveTo(cx + size, cy); ctx.lineTo(cx + size, cy - size); ctx.lineTo(cx, cy - size);
                } else {
                    ctx.arc(cx, cy, 20 * s, 0, rad, true);
                }
                ctx.stroke();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
            }
        }

        function endGame() {
            gameState = 'end';
            clearInterval(timerInterval);
            ui.overlay.style.display = 'flex'; ui.startScreen.style.display = 'none'; ui.endScreen.style.display = 'flex'; ui.survivalCnt.style.display = 'none';
            ui.endP1.innerText = players.p1.score.toFixed(1); ui.endP2.innerText = players.p2.score.toFixed(1);
            ui.p1WinMsg.style.display = 'none'; ui.p2WinMsg.style.display = 'none';
            let p1s = players.p1.score, p2s = players.p2.score;
            if (p1s > p2s) { ui.p1WinMsg.style.display = 'block'; showWinnerInput(p1s); }
            else if (p2s > p1s) { ui.p2WinMsg.style.display = 'block'; showWinnerInput(p2s); }
            else { ui.inputSec.style.display = 'none'; ui.replaySec.style.display = 'block'; }
            renderLeaderboard();
        }

        function showWinnerInput(score) {
            window.winningScore = score; ui.inputSec.style.display = 'block'; ui.replaySec.style.display = 'none';
            setTimeout(() => document.getElementById('winner-name').focus(), 100);
        }

        const LB_KEY = 'school_30th_lb_v4'; // 更新 Key
        function submitScore() {
            let name = ui.winnerInput.value.toUpperCase() || "AAA";
            let lb = JSON.parse(localStorage.getItem(LB_KEY) || "[]");
            lb.push({name: name, score: window.winningScore});
            lb.sort((a,b) => b.score - a.score); lb = lb.slice(0, 10);
            localStorage.setItem(LB_KEY, JSON.stringify(lb));
            ui.inputSec.style.display = 'none'; ui.replaySec.style.display = 'block';
            renderLeaderboard();
        }
        function renderLeaderboard() {
            let lb = JSON.parse(localStorage.getItem(LB_KEY) || "[]");
            let html = '';
            for(let i=0; i<10; i++) {
                let item = lb[i] || {name:'-', score:'-'};
                html += `<div class="lb-item"><span class="lb-rank">${i+1}.</span><span class="lb-name">${item.name}</span><span class="lb-score">${item.score}</span></div>`;
            }
            ui.lbList.innerHTML = html;
        }
        
        function spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1.0, color}); }
        function spawnFloatText(x, y, text, color) { floatingTexts.push({x, y, text, color, life:1.0}); }
        function shakeScreen(n) { shakeFrames = n; }
        function updateScoreUI() { ui.p1Score.innerText = players.p1.score.toFixed(1); ui.p2Score.innerText = players.p2.score.toFixed(1); }

        function gameLoop() {
            if (gameState === 'playing') updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
